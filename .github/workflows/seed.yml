name: Database Seeding & Data Refresh

on:
  # ── Scheduled runs ─────────────────────────────────────────────────
  # Nightly full refresh at 2 AM UTC (5 AM EAT)
  # Weekly deep refresh (bootstrap + all domains) on Sundays at 3 AM UTC
  schedule:
    - cron: '0 2 * * *'
    - cron: '0 3 * * 0'

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      domain:
        description: 'Domain to seed (leave empty for all domains)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (no database commits)'
        required: false
        type: boolean
        default: false
      run_bootstrap:
        description: 'Also run bootstrap seeding (county data + national data)'
        required: false
        type: boolean
        default: false
      run_validation:
        description: 'Run data validation after seeding'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  issues: write

env:
  # Shared database and seeding configuration
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  SEED_RATE_LIMIT: ${{ vars.SEED_RATE_LIMIT || '60/min' }}
  SEED_TIMEOUT_SECONDS: ${{ vars.SEED_TIMEOUT_SECONDS || '30.0' }}
  SEED_BUDGETS_DATASET_URL: ${{ secrets.SEED_BUDGETS_DATASET_URL }}
  SEED_AUDITS_DATASET_URL: ${{ secrets.SEED_AUDITS_DATASET_URL }}
  SEED_POPULATION_DATASET_URL: ${{ secrets.SEED_POPULATION_DATASET_URL }}
  SEED_ECONOMIC_INDICATORS_DATASET_URL: ${{ secrets.SEED_ECONOMIC_INDICATORS_DATASET_URL }}
  SEED_LOG_LEVEL: INFO

jobs:
  # ══════════════════════════════════════════════════════════════════
  # Step 0: Health-check all government data source URLs
  # Catches broken/migrated URLs BEFORE seeding starts so failures
  # are surfaced immediately instead of buried in log warnings.
  # ══════════════════════════════════════════════════════════════════
  healthcheck:
    name: Data Source Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      report: ${{ steps.check.outputs.report }}
      has_failures: ${{ steps.check.outputs.has_failures }}
    steps:
      - name: Check data source URLs
        id: check
        run: |
          #!/usr/bin/env bash
          # No set -e or pipefail — this script must always exit 0
          # so it never blocks seeding. Failures are reported via outputs.

          # ── Data source registry ──────────────────────────────────
          # Each entry: "LABEL|URL|CRITICAL"
          # CRITICAL=true  → workflow fails and creates an issue
          # CRITICAL=false → logged as warning only
          #
          # COB's slow HTML listings (`/publications/`, `/publications/county-reports/`,
          # `/publications/...-review-reports/`) routinely take 30-50s to render because
          # the WordPress query hits a CDN cache miss on low-traffic paths — they are
          # NOT the primary ingestion path. The real fetcher prefers `/wp-json/wp/v2/media`
          # (reliable, fast) and only falls back to HTML scraping, so the WP REST API
          # is the real "is ingestion healthy?" signal and is the only COB source
          # flagged as CRITICAL here.
          SOURCES=(
            "COB WP REST API|https://cob.go.ke/wp-json/wp/v2/media?per_page=1&mime_type=application/pdf|true"
            "COB Homepage|https://cob.go.ke/|false"
            "COB Publications|https://cob.go.ke/publications/|false"
            "COB County Reports|https://cob.go.ke/publications/county-reports/|false"
            "COB National Reports|https://cob.go.ke/publications/national-government-budget-implementation-review-reports/|false"
            "OAG Homepage|https://www.oagkenya.go.ke/|true"
            "OAG National Audit Reports|https://www.oagkenya.go.ke/national-government-audit-reports/|false"
            "CBK Homepage|https://www.centralbank.go.ke/|true"
            "CBK Public Debt|https://www.centralbank.go.ke/public-debt/|true"
            "Treasury|https://newsite.treasury.go.ke/|false"
            "World Bank API|https://api.worldbank.org/v2/country/KE?format=json|true"
            "IMF DataMapper|https://www.imf.org/external/datamapper/api/v1/GGXWDG_NGDP/KEN|false"
          )

          REPORT=""
          FAILED_CRITICAL=0
          FAILED_WARN=0
          TOTAL=${#SOURCES[@]}
          OK_COUNT=0

          for entry in "${SOURCES[@]}"; do
            IFS='|' read -r label url critical <<< "$entry"

            # Curl: follow redirects, 60s timeout (COB's HTML listings
            # legitimately take 30-50s), accept any 2xx/3xx.
            #
            # User-Agent: must start with a known HTTP-client identifier
            # (python-httpx / python-requests / curl) so the IMF
            # DataMapper API does not 403 us — it filters out
            # non-canonical UAs. We then append our own identifier + a
            # contact URL for site operators who want to reach us.
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -L --max-time 60 --retry 2 --retry-delay 3 \
              -A "python-httpx/0.27 KenyaAuditApp-HealthCheck/1.0 (+https://github.com/Rodgers31/audit_app)" \
              "$url" 2>/dev/null || echo "000")

            if [[ "$HTTP_CODE" =~ ^[23] ]]; then
              echo "  [OK]   $label ($HTTP_CODE)"
              REPORT="${REPORT}OK|${label}|${url}|${HTTP_CODE}\n"
              OK_COUNT=$((OK_COUNT + 1))
            else
              severity="WARNING"
              if [ "$critical" = "true" ]; then
                severity="CRITICAL"
                FAILED_CRITICAL=$((FAILED_CRITICAL + 1))
              else
                FAILED_WARN=$((FAILED_WARN + 1))
              fi
              echo "  [${severity}] $label → HTTP $HTTP_CODE ($url)"
              REPORT="${REPORT}${severity}|${label}|${url}|${HTTP_CODE}\n"
            fi
          done

          echo ""
          echo "─── Health Check Summary ───"
          echo "Total: $TOTAL | OK: $OK_COUNT | Critical Failures: $FAILED_CRITICAL | Warnings: $FAILED_WARN"

          # Write outputs for downstream jobs
          # Escape newlines for GitHub Actions output
          EOF_MARKER=$(dd if=/dev/urandom bs=15 count=1 2>/dev/null | base64)
          echo "report<<${EOF_MARKER}" >> "$GITHUB_OUTPUT"
          echo -e "$REPORT" >> "$GITHUB_OUTPUT"
          echo "${EOF_MARKER}" >> "$GITHUB_OUTPUT"

          if [ "$FAILED_CRITICAL" -gt 0 ]; then
            echo "has_failures=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_failures=false" >> "$GITHUB_OUTPUT"
          fi

          # Write to step summary
          echo "## Data Source Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Source | URL | HTTP Code |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|-----|-----------|" >> $GITHUB_STEP_SUMMARY
          echo -e "$REPORT" | while IFS='|' read -r status label url code; do
            [ -z "$status" ] && continue
            if [ "$status" = "OK" ]; then
              echo "| ✅ OK | $label | $url | $code |" >> $GITHUB_STEP_SUMMARY
            elif [ "$status" = "CRITICAL" ]; then
              echo "| ❌ CRITICAL | **$label** | $url | $code |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| ⚠️ WARNING | $label | $url | $code |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**OK:** $OK_COUNT / $TOTAL | **Critical:** $FAILED_CRITICAL | **Warnings:** $FAILED_WARN" >> $GITHUB_STEP_SUMMARY

          # Log a warning annotation if critical sources are down
          if [ "$FAILED_CRITICAL" -gt 0 ]; then
            echo "::warning::$FAILED_CRITICAL critical data source(s) unreachable. Seeding will proceed but may produce incomplete data."
          fi

          # Always exit 0 — health check is informational only.
          # The notify job reads outputs to create GitHub issues.
          exit 0

  # ══════════════════════════════════════════════════════════════════
  # Step 1: Run database migrations
  # ══════════════════════════════════════════════════════════════════
  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install --upgrade pip && pip install -r backend/requirements.txt
      - name: Run alembic migrations
        run: cd backend && alembic upgrade head

  # ══════════════════════════════════════════════════════════════════
  # Step 2: Bootstrap seeding (counties, national GDP, population, etc.)
  # Runs on manual trigger with run_bootstrap=true, or on Sunday schedule
  # ══════════════════════════════════════════════════════════════════
  bootstrap:
    name: Bootstrap Reference Data
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: >-
      github.event.inputs.run_bootstrap == 'true' ||
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * 0')
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install --upgrade pip && pip install -r backend/requirements.txt
      - name: Run bootstrap seeding
        run: |
          cd backend
          python -c "
          import logging
          logging.basicConfig(level=logging.INFO, format='%(asctime)s %(name)s %(levelname)s %(message)s')
          from bootstrap import initialize_reference_data
          initialize_reference_data()
          print('Bootstrap seeding completed successfully')
          "

  # ══════════════════════════════════════════════════════════════════
  # Step 3: Domain seeding (economic indicators, debt, budgets, etc.)
  # ══════════════════════════════════════════════════════════════════
  seed:
    name: Seed Data Domains
    needs: [migrate]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install --upgrade pip && pip install -r backend/requirements.txt

      - name: Seed all domains
        if: github.event.inputs.domain == '' || github.event.inputs.domain == null
        run: |
          cd backend
          python -m seeding.cli seed --all ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Seed specific domain
        if: github.event.inputs.domain != '' && github.event.inputs.domain != null
        run: |
          cd backend
          python -m seeding.cli seed --domain ${{ github.event.inputs.domain }} ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Check ingestion job results
        if: always()
        run: |
          cd backend
          python -c "
          import sys
          from database import SessionLocal
          from models import IngestionJob, IngestionStatus
          from datetime import datetime, timedelta

          session = SessionLocal()
          cutoff = datetime.utcnow() - timedelta(minutes=30)
          jobs = session.query(IngestionJob).filter(IngestionJob.started_at >= cutoff).order_by(IngestionJob.id.desc()).all()

          failed = 0
          print('\n--- Ingestion Job Results ---')
          for job in jobs:
              status = job.status.value
              emoji = 'OK' if status == 'completed' else 'WARN' if status == 'completed_with_errors' else 'FAIL'
              print(f'[{emoji}] {job.domain}: {status} | created={job.items_created} updated={job.items_updated} processed={job.items_processed}')
              if job.errors:
                  for err in job.errors[:3]:
                      print(f'  ERROR: {str(err)[:200]}')
              if status == 'failed':
                  failed += 1

          session.close()
          if failed > 0:
              print(f'\n{failed} domain(s) failed!')
              sys.exit(1)
          print('\nAll domains completed successfully.')
          "

  # ══════════════════════════════════════════════════════════════════
  # Step 4: Data validation — verify tables have data and key metrics are sane
  # ══════════════════════════════════════════════════════════════════
  validate:
    name: Validate Data Integrity
    needs: [seed]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.inputs.run_validation != 'false'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install --upgrade pip && pip install -r backend/requirements.txt

      - name: Validate seeded data
        run: |
          cd backend
          python -c "
          import sys
          from database import SessionLocal
          from models import (
              Entity, EntityType, Audit, BudgetLine, Loan, PopulationData,
              GDPData, EconomicIndicator, PovertyIndex, DebtTimeline,
              FiscalSummary, FiscalPeriod,
          )
          from sqlalchemy import func

          session = SessionLocal()
          errors = []
          warnings = []

          def check(label, query_count, min_expected, is_warning=False):
              count = query_count
              status = 'OK' if count >= min_expected else ('WARN' if is_warning else 'FAIL')
              print(f'[{status}] {label}: {count} rows (expected >= {min_expected})')
              if count < min_expected:
                  msg = f'{label}: {count} rows (expected >= {min_expected})'
                  if is_warning:
                      warnings.append(msg)
                  else:
                      errors.append(msg)

          # ── Core reference data ──
          check('Counties',
                session.query(Entity).filter(Entity.type == EntityType.COUNTY).count(),
                47)
          check('National Entity',
                session.query(Entity).filter(Entity.type == EntityType.NATIONAL).count(),
                1)
          check('Fiscal Periods',
                session.query(FiscalPeriod).count(),
                1)

          # ── Budget data ──
          check('Budget Lines',
                session.query(BudgetLine).count(),
                400)

          # ── Audit data ──
          total_audits = session.query(Audit).count()
          check('Audit Records', total_audits, 50)
          audits_with_year = session.query(Audit).filter(Audit.audit_year.isnot(None)).count()
          check('Audits with audit_year', audits_with_year, 50)
          audits_with_type = session.query(Audit).filter(Audit.query_type.isnot(None)).count()
          check('Audits with query_type', audits_with_type, 30)

          # ── Population data ──
          check('Population Records',
                session.query(PopulationData).count(),
                48)
          check('National Population (entity_id=NULL)',
                session.query(PopulationData).filter(PopulationData.entity_id.is_(None)).count(),
                1)

          # ── GDP data ──
          check('GDP Records (entity-linked)',
                session.query(GDPData).filter(GDPData.entity_id.isnot(None)).count(),
                5)
          check('GDP Records (national, entity_id=NULL)',
                session.query(GDPData).filter(GDPData.entity_id.is_(None)).count(),
                5, is_warning=True)

          # ── Economic indicators ──
          check('Economic Indicators',
                session.query(EconomicIndicator).count(),
                5)
          check('Inflation Rate records',
                session.query(EconomicIndicator).filter(EconomicIndicator.indicator_type == 'inflation_rate').count(),
                1)
          check('Unemployment Rate records',
                session.query(EconomicIndicator).filter(EconomicIndicator.indicator_type == 'unemployment_rate').count(),
                1)

          # ── Poverty data ──
          check('Poverty Index Records',
                session.query(PovertyIndex).count(),
                1, is_warning=True)

          # ── Debt data ──
          check('Loan Records',
                session.query(Loan).count(),
                50)
          check('Debt Timeline',
                session.query(DebtTimeline).count(),
                5, is_warning=True)
          check('Fiscal Summaries',
                session.query(FiscalSummary).count(),
                3, is_warning=True)

          # ── Sanity checks: values in reasonable ranges ──
          latest_pop = session.query(PopulationData).filter(
              PopulationData.entity_id.is_(None)
          ).first()
          if latest_pop and (latest_pop.total_population < 40_000_000 or latest_pop.total_population > 70_000_000):
              errors.append(f'National population out of range: {latest_pop.total_population}')
              print(f'[FAIL] National population sanity check: {latest_pop.total_population}')
          elif latest_pop:
              print(f'[OK] National population sanity: {latest_pop.total_population:,}')

          latest_gdp = session.query(GDPData).filter(
              GDPData.entity_id.is_(None)
          ).order_by(GDPData.year.desc()).first()
          if latest_gdp:
              gdp_trillions = float(latest_gdp.gdp_value) / 1e12
              if gdp_trillions < 5 or gdp_trillions > 30:
                  errors.append(f'National GDP out of range: {gdp_trillions:.1f}T KES')
                  print(f'[FAIL] GDP sanity: {gdp_trillions:.1f}T KES')
              else:
                  print(f'[OK] GDP sanity: {gdp_trillions:.1f}T KES (year {latest_gdp.year})')

          session.close()

          print(f'\n--- Summary ---')
          print(f'Errors: {len(errors)}, Warnings: {len(warnings)}')
          if errors:
              print('CRITICAL ERRORS:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)
          if warnings:
              print('Warnings (non-blocking):')
              for w in warnings:
                  print(f'  - {w}')
          print('Data validation passed.')
          "

  # ══════════════════════════════════════════════════════════════════
  # Step 5: Summary and notifications
  # ══════════════════════════════════════════════════════════════════
  notify:
    name: Post-Run Summary
    needs: [healthcheck, seed, validate]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Create summary
        run: |
          echo "## Database Seeding Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Run Time** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered By** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Domain** | ${{ github.event.inputs.domain || 'all' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dry Run** | ${{ github.event.inputs.dry_run || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Bootstrap** | ${{ github.event.inputs.run_bootstrap || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Health Check** | ${{ needs.healthcheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Seed Status** | ${{ needs.seed.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Validation** | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See [seeding guide](https://github.com/${{ github.repository }}/blob/main/docs/seeding-guide.md) for details." >> $GITHUB_STEP_SUMMARY

      - name: Create issue on URL health-check failure
        if: needs.healthcheck.outputs.has_failures == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Parse the health-check report to build a readable table
            const report = `${{ needs.healthcheck.outputs.report }}`;
            const lines = report.trim().split('\n').filter(l => l.trim());

            let tableRows = '';
            const failedSources = [];
            for (const line of lines) {
              const parts = line.split('|');
              if (parts.length < 4) continue;
              const [status, label, url, code] = parts;
              if (status === 'CRITICAL' || status === 'WARNING') {
                const icon = status === 'CRITICAL' ? '🔴' : '🟡';
                tableRows += `| ${icon} ${status} | ${label} | ${url} | ${code} |\n`;
                if (status === 'CRITICAL') failedSources.push(label);
              }
            }

            // Check for existing open issue to avoid duplicates
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'data-source-down',
              state: 'open',
            });

            const today = new Date().toISOString().split('T')[0];
            const title = `⚠️ Data source(s) unreachable: ${failedSources.join(', ')} — ${today}`;
            const body = [
              `## Data Source Health Check Failed`,
              ``,
              `The nightly seeding pipeline detected **${failedSources.length} critical** data source(s) returning errors.`,
              ``,
              `### Affected Sources`,
              ``,
              `| Status | Source | URL | HTTP Code |`,
              `|--------|--------|-----|-----------|`,
              tableRows,
              ``,
              `### What This Means`,
              `- The seeding pipeline still ran, but affected domains may have **stale or missing data**`,
              `- Government websites (OAG, COB, CBK) occasionally restructure their URLs`,
              `- External APIs (World Bank, IMF) may have temporary outages`,
              ``,
              `### Action Required`,
              `1. Check if the URLs load in a browser — if they redirect to a new path, update the fetcher`,
              `2. Look at the [workflow run logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details`,
              `3. If the site is temporarily down, this issue can be closed — the pipeline retries nightly`,
              `4. If the URL has permanently changed, update the source URLs in:`,
              `   - \`backend/seeding/domains/*/fetcher.py\``,
              `   - \`backend/seeding/config.py\``,
              `   - \`backend/routers/data_provenance.py\``,
              ``,
              `### Common URL Migrations`,
              `| Site | Old Pattern | New Pattern |`,
              `|------|------------|-------------|`,
              `| COB | \`cob.go.ke/reports/\` | \`cob.go.ke/publications/\` |`,
              `| OAG | \`oagkenya.go.ke/reports/\` | \`oagkenya.go.ke/\` (root) |`,
              `| Treasury | \`treasury.go.ke/\` | \`newsite.treasury.go.ke/\` |`,
              ``,
              `---`,
              `*Auto-generated by the Database Seeding & Data Refresh workflow*`,
            ].join('\n');

            // If there's already an open issue with this label, comment on it instead
            if (existingIssues.data.length > 0) {
              const existing = existingIssues.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `### Update — ${today}\n\nHealth check still failing:\n\n${tableRows}\n\n[Workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
              console.log(`Commented on existing issue #${existing.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['bug', 'data-pipeline', 'data-source-down', 'automated'],
              });
              console.log('Created new health-check failure issue');
            }

      - name: Create issue on seeding/validation failure
        if: needs.seed.result == 'failure' || needs.validate.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const seedResult = '${{ needs.seed.result }}';
            const validateResult = '${{ needs.validate.result }}';
            const failedSteps = [];
            if (seedResult === 'failure') failedSteps.push('Seeding');
            if (validateResult === 'failure') failedSteps.push('Validation');

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Data pipeline failed: ${failedSteps.join(', ')} — ${new Date().toISOString().split('T')[0]}`,
              body: `## Automated Data Pipeline Failure\n\n` +
                `**Failed Steps:** ${failedSteps.join(', ')}\n` +
                `**Health Check:** ${{ needs.healthcheck.outputs.has_failures == 'true' && '⚠️ Some sources were unreachable (may be related)' || '✅ All sources reachable' }}\n` +
                `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n` +
                `**Triggered by:** ${context.eventName}\n` +
                `**Domain:** ${{ github.event.inputs.domain || 'all' }}\n\n` +
                `### Action Required\n` +
                `1. Check the [workflow run logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n` +
                `2. Verify the \`ingestion_jobs\` table for domain-level errors\n` +
                `3. If a data source is down, the workflow will retry tomorrow automatically\n` +
                `4. For persistent failures, check if the upstream API/URL has changed\n`,
              labels: ['bug', 'data-pipeline', 'automated']
            });
